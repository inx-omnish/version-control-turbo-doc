name: Sync Changes to Monorepo

on:
  push:
    branches:
      - main # Trigger on push to main branch

jobs:
  sync-to-monorepo:
    runs-on: ubuntu-latest

    steps:
      # Checkout the individual repo (docs or web)
      - name: Checkout Source Repository
        uses: actions/checkout@v3

      # Clone the monorepo
      - name: Clone Monorepo
        run: |
          git clone https://$MONOREPO_PAT@github.com/inx-omnish/version-control-turbo.git monorepo
        env:
          MONOREPO_PAT: ${{ secrets.MONOREPO_PAT }}

      # Sync changes to a temporary directory and then to monorepo/apps/docs
      - name: Sync Changes via Temporary Directory
        run: |
          mkdir temp_sync
          rsync -av --exclude='.git' --exclude='monorepo' ./ temp_sync/
          rsync -av --delete temp_sync/ monorepo/apps/docs/
          rm -rf temp_sync  # Remove temporary folder

      # Configure Git and check for changes
      - name: Commit and Push Changes to Monorepo
        working-directory: monorepo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check for changes
          if git diff --quiet; then
            echo "No changes detected in monorepo. Exiting without commit or PR."
            exit 0
          fi

          # Create a unique branch name
          branch_name="sync-${{ github.event.repository.name }}-$(date +'%Y%m%d%H%M%S')"
          echo "branch_name=${branch_name}" >> $GITHUB_ENV  # Export branch name

          # Switch to new branch, commit, and push changes
          git checkout -b "$branch_name"
          git add apps/docs  # Only add relevant changes
          git commit -m "Sync changes from ${{ github.event.repository.name }} repo"
          git push origin "$branch_name"
        env:
          MONOREPO_PAT: ${{ secrets.MONOREPO_PAT }}

      # Create PR in the monorepo (JavaScript inside the `script` section)
      - name: Create PR in Monorepo
        uses: actions/github-script@v6
        with:
          script: |
            const branchName = process.env.branch_name;
            await github.rest.pulls.create({
              owner: 'inx-omnish',
              repo: 'version-control-turbo',
              title: `Sync changes from ${{ github.event.repository.name }} repo`,
              head: branchName,
              base: 'main',
              body: "Automated PR to sync changes from ${{ github.event.repository.name }} repository."
            });
        env:
          branch_name: ${{ env.branch_name }}

      # Remove cloned monorepo
      - name: Clean Up Monorepo Folder
        run: |
          rm -rf monorepo
