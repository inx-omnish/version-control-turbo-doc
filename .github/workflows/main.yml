name: Sync Changes to Monorepo

on:
  push:
    branches:
      - main # The branch in your individual repo (`docs` or `web`) to trigger this workflow

jobs:
  sync-to-monorepo:
    runs-on: ubuntu-latest

    steps:
      # Checkout the individual repo (docs or web)
      - name: Checkout Source Repository
        uses: actions/checkout@v3

      # Clone the monorepo for comparison and updates
      - name: Clone Monorepo
        run: |
          git clone https://$MONOREPO_PAT@github.com/inx-omnish/version-control-turbo.git monorepo
        env:
          MONOREPO_PAT: ${{ secrets.MONOREPO_PAT }}

      # Sync changes from the individual repo to a temporary folder, then to monorepo
      - name: Sync Changes via Temporary Directory
        run: |
          # Create a temporary directory for syncing
          mkdir temp_sync

          # Use rsync to copy changes to temp_sync (excluding .git and monorepo folder)
          rsync -av --exclude='.git' --exclude='monorepo' ./ temp_sync/

          # Copy only updated files to monorepo/apps/docs
          rsync -av --delete temp_sync/ monorepo/apps/docs/

      # Clean up the temporary sync folder
      - name: Remove Temporary Sync Folder
        run: |
          rm -rf temp_sync

      # Set up Git for creating a branch and pushing in the monorepo
      - name: Commit and Push Changes to Monorepo
        working-directory: monorepo
        run: |
          # Configure Git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check for changes; if none, exit without creating a PR
          if git diff --quiet; then
            echo "No changes detected in monorepo. Exiting without commit or PR."
            exit 0
          fi

          # Create a unique branch name
          branch_name="sync-${{ github.event.repository.name }}-$(date +'%Y%m%d%H%M%S')"
          echo "branch_name=${branch_name}" >> $GITHUB_ENV  # Export branch name as an environment variable

          # Switch to new branch, commit, and push changes
          git checkout -b "$branch_name"
          git add apps/docs  # Only add changes from apps/docs
          git commit -m "Sync changes from ${{ github.event.repository.name }} repo"
          git push origin "$branch_name"
        env:
          MONOREPO_PAT: ${{ secrets.MONOREPO_PAT }}

      # Trigger a PR creation in the monorepo if changes were committed
      - name: Trigger PR Creation in Monorepo
        uses: actions/github-script@v6
        with:
          script: |
            console.log("Branch name:", process.env.branch_name);  // Debug log
            await github.rest.pulls.create({
              owner: 'inx-omnish',
              repo: 'version-control-turbo',
              title: `Sync changes from ${{ github.event.repository.name }} repo`,
              head: process.env.branch_name,
              base: 'main',
              body: "Automated PR to sync changes from ${{ github.event.repository.name }} repository."
            });
        env:
          branch_name: ${{ env.branch_name }}

      # Clean up by removing the monorepo folder
      - name: Remove Entire Monorepo Folder
        run: |
          rm -rf monorepo  # This deletes the cloned monorepo folder
